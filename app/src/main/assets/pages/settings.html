<div class="header">
          <div class="settings-btn" onclick="goBackFromSettings()" style="display:flex;align-items:center;gap:4px;width:auto;padding:0 4px;">
            <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:white;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span style="font-size:14px;font-weight:500;" data-i18n="settings.back">Quay lại</span>
          </div>
          <h1 style="font-size:18px;" data-i18n="settings.title">CÀI ĐẶT</h1>
          <div style="width:38px;"></div>
        </div>
        <div class="content" id="settingsContent">

          <div class="modal-section-title" data-i18n="settings.display">🎨 Giao diện & Hiển thị</div>
          <div class="setting-row" onclick="toggleDarkMode()" style="cursor:pointer;">
            <div>
              <div class="setting-label" data-i18n="settings.dark_mode">Chế độ tối</div>
              <div class="setting-desc" data-i18n="settings.dark_desc">Giao diện tối cho môi trường thiếu sáng</div>
            </div>
            <div class="toggle" id="darkToggle"></div>
          </div>
          <div class="setting-row" onclick="showLanguagePicker()" style="cursor:pointer;">
            <div>
              <div class="setting-label" data-i18n="settings.language">Ngôn ngữ</div>
              <div class="setting-desc" id="settingsLangDesc" data-i18n="settings.lang_desc">Tiếng Việt</div>
            </div>
            <span style="color:#1a4a8a;font-weight:600;font-size:13px;"><span id="settingsLangCode">VI</span> ›</span>
          </div>

          <div class="modal-section-title" data-i18n="settings.app">ℹ️ Ứng dụng</div>
          <div class="setting-row" onclick="showScannerDialog()" style="cursor:pointer;">
            <div>
              <div class="setting-label">📡 Kết nối Scanner</div>
              <div class="setting-desc" id="scannerStatusDesc">Bluetooth SPP / BLE</div>
            </div>
            <span style="color:#999;font-size:18px;">›</span>
          </div>
          <div class="setting-row" onclick="showToast('NC MEMS v1.0.0')" style="cursor:pointer;">
            <div>
              <div class="setting-label" data-i18n="settings.version">Phiên bản</div>
              <div class="setting-desc" data-i18n="settings.version_desc">NC MEMS v1.0.0</div>
            </div>
          </div>

          <div style="height:24px;"></div>
        </div>
